<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | Philanthropic Playlist</title>

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>

<body>
  <div id="blob-background"></div>
  <div class="transition-curtain"></div>

  <div class="page-stage">
    <div class="site-frame {% if page.hide_feature %}no-feature{% endif %}">
      <aside class="sidebar">
        <a href="{{ '/' | relative_url }}" class="brand">PP</a>

        <div class="sidebar-section">
          <p class="sidebar-label">Pages</p>

          <nav class="sidebar-nav">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/about.html' | relative_url }}">About</a>
            <a href="{{ '/events.html' | relative_url }}">Events</a>
            <a href="{{ '/impact.html' | relative_url }}">Impact</a>
            <a href="{{ '/team.html' | relative_url }}">Team</a>
          </nav>
        </div>
      </aside>

      <main class="main-content">
        {{ content }}
      </main>

      {% unless page.hide_feature %}
<section class="feature-panel">
  <div class="feature-card performance-card">
    <div class="performance-image-wrap">
      <img
        src="{{ '/assets/images/IMG_4556.jpeg' | relative_url }}"
        alt="Philanthropic Playlist recent performance"
        class="performance-image"
      >
    </div>

    <div class="performance-card-content">
      <p class="feature-label">Recent Performance</p>
      <h2>Our Latest Show</h2>
      <p>
        This past semester, the members of the Philanthropic Playlist gathered to perform at Presby Hall to fundraise for local charity.
      </p>
    </div>
  </div>
</section>
{% endunless %}

      <footer class="bottom-bar">
  <div class="contact-links icon-links">
  <a
    href="https://www.instagram.com/uiuc.philanthropic.playlist/"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Follow us on Instagram"
    class="icon-link"
  >
    <img
      src="{{ '/assets/images/insta.png' | relative_url }}"
      alt=""
      class="footer-icon-img"
    >
  </a>

  <a
    href="https://web.groupme.com/join_group/114785294/An8wHGty"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Join our GroupMe"
    class="icon-link"
  >
    <img
      src="{{ '/assets/images/groupme.png' | relative_url }}"
      alt=""
      class="footer-icon-img"
    >
  </a>

  <a
    href="https://docs.google.com/forms/d/e/1FAIpQLSduZesDdUcxk7ATY3WKJFZ3fyoKgadIVygKoT4-En7_LxaTTg/viewform"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Join our Newsletter"
    class="icon-link"
  >
    <!-- Envelope / newsletter icon stays the same -->
    <svg viewBox="0 0 24 24" aria-hidden="true" class="footer-icon">
      <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4h13A2.5 2.5 0 0 1 21 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17.5v-11Z" fill="none" stroke="currentColor" stroke-width="2"/>
      <path d="M4.5 7.5 12 13l7.5-5.5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</div>

  <div class="footer-brand-lockup">
    <img
      src="{{ '/assets/images/uiuc.png' | relative_url }}"
      alt="University of Illinois block I"
      class="footer-school-logo"
    >

    <span class="footer-divider-x">×</span>

    <img
      src="{{ '/assets/images/pp2.png' | relative_url }}"
      alt="Philanthropic Playlist logo"
      class="footer-rso-logo"
    >
  </div>
</footer>
    </div>
  </div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
<script src="https://unpkg.com/split-type"></script>
<script src="{{ '/assets/js/floating-title.js' | relative_url }}"></script>
<script src="{{ '/assets/js/blob-background.js' | relative_url }}"></script>
<script src="{{ '/assets/js/scroll.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/transitions.js' | relative_url }}"></script>
</body>
</html>
